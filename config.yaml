# ─────────────────────────────────────────────────────────────────────────────
# Agent Council — config.yaml
# Edit this file to customise your council, or run: python setup.py
# ─────────────────────────────────────────────────────────────────────────────

project:
  name: my-council
  context: ""            # One-line description — injected into every agent as shared context

# ── Leader (Agent A) ─────────────────────────────────────────────────────────
# The Leader routes queries, commands sub-agents, and passes final judgment.
leader:
  model: claude-sonnet-4-6   # upgrade to claude-opus-4-7 for harder decisions

# ── Sub-agents ────────────────────────────────────────────────────────────────
# Each entry maps a name to a skill and optional overrides.
# Built-in skills: strategist · critic · researcher · executor
# Add custom skills by creating skills/your_skill.py (see skills/base.py)
agents:
  strategist:
    skill: strategist
    extra_instructions: ""   # domain-specific focus, e.g. "focus on SaaS B2B context"

  critic:
    skill: critic
    extra_instructions: ""

  researcher:
    skill: researcher
    extra_instructions: ""

  executor:
    skill: executor
    extra_instructions: ""

# ── Local models (optional, free) ─────────────────────────────────────────────
# If Ollama is running, routing and compression tasks use local models at zero cost.
# Run: ollama pull llama3.2  to get a fast local model.
local_models:
  enabled: false
  available: []              # auto-populated by setup.py; or list model names manually

# ── Memory ────────────────────────────────────────────────────────────────────
memory:
  max_session_exchanges: 10  # auto-compress to summary after this many turns
  long_term_path: memory/long_term

# ── Knowledge base ────────────────────────────────────────────────────────────
# Drop any .md file into the knowledge/ folder.
# Relevant snippets are auto-injected into agent prompts — zero config required.
knowledge:
  path: knowledge

# ── MCP tool servers (optional) ───────────────────────────────────────────────
mcp:
  servers: []
  # examples:
  # - name: filesystem
  #   command: npx
  #   args: [-y, "@modelcontextprotocol/server-filesystem", /path/to/dir]
  # - name: brave-search
